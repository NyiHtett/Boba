<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Boba Icon Generator</title>
<style>
  body { font-family: sans-serif; background: #1a1a2e; color: #fff; padding: 40px; text-align: center; }
  .icons { display: flex; gap: 32px; justify-content: center; align-items: flex-end; flex-wrap: wrap; margin: 32px 0; }
  .icon-box { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  canvas { border: 1px solid #444; border-radius: 8px; background: #5B6FC7; }
  a { color: #D4A574; font-weight: bold; text-decoration: none; padding: 6px 16px; border: 2px solid #D4A574; border-radius: 8px; display: inline-block; margin-top: 4px; }
  a:hover { background: #D4A574; color: #1a1a2e; }
  p { color: #aaa; }
</style>
</head>
<body>
<h1>Boba Icon Generator</h1>
<p>Right-click and "Save image as" or use the download links below each icon.</p>
<div class="icons" id="icons"></div>

<script>
const sizes = [16, 32, 48, 128];

function drawBoba(ctx, size) {
  const s = size / 30; // scale factor (base design is ~30px wide)
  const ox = size * 0.5 - 15 * s;
  const oy = size * 0.18;

  function r(x, y, w, h) { ctx.fillRect(ox + x * s, oy + y * s, w * s, h * s); }

  // Lid dome
  ctx.fillStyle = "#F5E6D3";
  r(2, 0, 26, 6);
  r(4, -3, 22, 4);
  r(8, -5, 14, 3);
  // Lid rim
  ctx.fillStyle = "#D4C4B0";
  r(0, 5, 30, 3);
  // Straw
  ctx.fillStyle = "#E85D75";
  r(13, -14, 4, 16);
  r(13, -14, 8, 3);
  r(18, -17, 3, 6);

  // Cup body
  ctx.fillStyle = "#8B5E3C";
  r(2, 8, 26, 26);
  ctx.fillStyle = "#7A5030";
  r(4, 30, 22, 4);
  r(3, 26, 24, 4);
  // Highlight
  ctx.fillStyle = "#A07050";
  r(5, 10, 3, 22);

  // Window + tea
  ctx.fillStyle = "#F5E6D3";
  r(8, 14, 14, 14);
  ctx.fillStyle = "#D4A574";
  r(9, 15, 12, 12);

  // Eyes (awake)
  ctx.fillStyle = "#2C1810";
  r(10, 17, 3, 3);
  r(18, 17, 3, 3);
  ctx.fillStyle = "#FFFFFF";
  r(10, 17, 1, 1);
  r(18, 17, 1, 1);

  // Blush
  ctx.fillStyle = "rgba(232, 93, 117, 0.55)";
  r(7, 22, 4, 2);
  r(20, 22, 4, 2);

  // Mouth
  ctx.fillStyle = "#5A3A20";
  r(14, 24, 3, 2);

  // Legs
  ctx.fillStyle = "#8B5E3C";
  r(6, 34, 4, 4);
  r(20, 34, 4, 4);
  ctx.fillStyle = "#E85D75";
  r(4, 37, 7, 3);
  r(19, 37, 7, 3);
}

const container = document.getElementById("icons");

for (const size of sizes) {
  const box = document.createElement("div");
  box.className = "icon-box";

  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");

  // Background: accent color with rounded feel
  ctx.fillStyle = "#5B6FC7";
  ctx.fillRect(0, 0, size, size);

  drawBoba(ctx, size);

  const label = document.createElement("span");
  label.textContent = `${size}x${size}`;

  const link = document.createElement("a");
  link.textContent = "Download";
  link.download = `icon${size}.png`;

  // Convert to PNG data URL
  link.href = canvas.toDataURL("image/png");

  box.appendChild(canvas);
  box.appendChild(label);
  box.appendChild(link);
  container.appendChild(box);
}
</script>
</body>
</html>
